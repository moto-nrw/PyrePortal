# Project information
sonar.projectKey=moto-nrw_PyrePortal
sonar.projectName=PyrePortal
sonar.organization=moto-nrw

# Source directories
sonar.sources=src,src-tauri/src

# Test directories
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# TypeScript/JavaScript frontend configuration
sonar.typescript.tsconfigPaths=tsconfig.json
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/*.d.ts,\
  **/coverage/**,\
  **/src-tauri/target/**,\
  **/src-tauri/gen/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/vite.config.ts

# Test exclusions
sonar.test.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Coverage exclusions - test infrastructure and setup files
sonar.coverage.exclusions=\
  src/test/**,\
  src/vite-env.d.ts

# Rust configuration (native SonarCloud support)
sonar.rust.lcov.reportPaths=src-tauri/coverage/lcov.info

# Security settings
sonar.security.hotspots.inheritFromParent=true
