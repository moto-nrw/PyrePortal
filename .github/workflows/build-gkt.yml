name: Build GKT

on: [workflow_call]

defaults:
  run:
    shell: bash

jobs:
  build-gkt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build GKT
        run: npx tsc && npx vite build
        env:
          BUILD_TARGET: gkt
