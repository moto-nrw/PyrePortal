name: Deploy GKT

on:
  push:
    branches:
      - development
      - main

defaults:
  run:
    shell: bash

concurrency:
  group: deploy-gkt-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      API_URL: ${{ github.ref == 'refs/heads/main' && vars.GKT_PROD_API_URL || vars.GKT_STAGING_API_URL }}
      DEPLOY_DIR: ${{ github.ref == 'refs/heads/main' && '/var/www/pyreportal' || '/var/www/pyreportal-staging' }}
      DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Prepare GitHub release
        if: github.ref == 'refs/heads/main'
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if TARGET=$(gh release view "$TAG" --json targetCommitish --jq '.targetCommitish' 2>/dev/null); then
            if [ "$TARGET" != "${{ github.sha }}" ]; then
              echo "::error::Release $TAG already targets $TARGET, not ${{ github.sha }}"
              exit 1
            fi

            echo "Release $TAG already targets this commit; treating this run as a retry."
            echo "create=false" >> "$GITHUB_OUTPUT"
          else
            # Distinguish a missing release from an authentication/API failure.
            gh api "repos/${{ github.repository }}" --silent
            echo "create=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build GKT
        run: pnpm tsc && pnpm vite build
        env:
          BUILD_TARGET: gkt
          VITE_API_BASE_URL: ${{ env.API_URL }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        id: deploy
        run: |
          set +e
          rsync -av --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            root@${{ vars.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/
          DEPLOY_EXIT=$?
          set -e

          echo "deploy_exit=$DEPLOY_EXIT" >> "$GITHUB_OUTPUT"

          if [ "$DEPLOY_EXIT" -ne 0 ]; then
            exit 1
          fi

      - name: Cleanup secrets
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Create GitHub release
        if: github.ref == 'refs/heads/main' && steps.release.outputs.create == 'true' && steps.deploy.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.release.outputs.tag }}" \
            --generate-notes

      - name: Notify Slack
        if: always() && steps.deploy.outcome != 'skipped'
        uses: ./.github/actions/notify-deploy-slack
        with:
          webhook_url: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          job_status: ${{ job.status }}
          environment: ${{ env.DEPLOY_ENV }}
          app_name: PyrePortal
          exit_code: ${{ steps.deploy.outputs.deploy_exit }}
          github_token: ${{ github.token }}
          repository: ${{ github.repository }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          commit_url: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          sha: ${{ github.sha }}
          actor: ${{ github.actor }}
