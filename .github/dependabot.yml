# Dependabot configuration for PyrePortal
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Strategy: Minimize PRs - one per ecosystem (npm, actions)

version: 2
updates:
  # npm packages - ALL in one PR
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Berlin'
    groups:
      all-npm:
        patterns:
          - '*'
    # Ignore eslint major updates - eslint-plugin-import doesn't support eslint 10 yet
    ignore:
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'

  # GitHub Actions - ALL in one PR
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Berlin'
    groups:
      all-actions:
        patterns:
          - '*'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
